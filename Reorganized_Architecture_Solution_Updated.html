<script>
  // Mapping IDs to descriptions
  const descriptions = {
    "0394214ff8": "Description for 0394214ff8",
    "d481b18922": "Description for d481b18922",
    "0246e9b71e": "Description for 0246e9b71e",
    "c98cd27cc8": "Description for c98cd27cc8",
    "1a7b780bc2": "Description for 1a7b780bc2",
    "61909f09ce": "Description for 61909f09ce",
    "35d3c3be8d": "Description for 35d3c3be8d",
    "efdf930241": "Description for efdf930241",
    "eff180d6b4": "Description for eff180d6b4",
    "bd604011d6": "Description for bd604011d6",
    "308b8e2d11": "Description for 308b8e2d11",
    "2195ed1c45": "Description for 2195ed1c45",
    "816a7b69b9": "Description for 816a7b69b9",
    "61bce0ceef": "Description for 61bce0ceef",
    "6ca0aa8464": "Description for 6ca0aa8464"
  };

  const tooltip = document.getElementById("tooltip");

// Fonction pour afficher le tooltip
function showTooltip(event, description) {
  tooltip.style.display = "block";
  tooltip.textContent = description;
  const touch = event.touches ? event.touches[0] : event;
  tooltip.style.left = touch.pageX + 10 + "px";
  tooltip.style.top = touch.pageY + 10 + "px";
}

// Fonction pour masquer le tooltip
function hideTooltip() {
  tooltip.style.display = "none";
}

// Ajout des événements pour les interactions tactiles et de souris
document.querySelectorAll("[clip-path]").forEach(element => {
  const clipPathId = element.getAttribute("clip-path").match(/#([\w-]+)/)[1];
  const description = descriptions[clipPathId];

  if (description) {
    // Gestion des événements pour la souris
    element.addEventListener("mouseover", event => showTooltip(event, description));
    element.addEventListener("mousemove", event => showTooltip(event, description));
    element.addEventListener("mouseout", hideTooltip);

    // Gestion des événements tactiles
    element.addEventListener("touchstart", event => {
      event.preventDefault(); // Empêche les comportements par défaut
      showTooltip(event, description);
    });
    element.addEventListener("touchmove", event => showTooltip(event, description));
    //element.addEventListener("touchend", hideTooltip);
  }
});

</script>
<script>
  // Détection de l'orientation
  function checkOrientation() {
    const rotateScreen = document.getElementById("rotate-screen");
    const content = document.getElementById("content");

    if (window.innerHeight > window.innerWidth) {
      // Mode portrait : afficher le message
      rotateScreen.style.display = "flex";
      content.style.display = "none";
    } else {
      // Mode paysage : afficher le contenu
      rotateScreen.style.display = "none";
      content.style.display = "block";
    }
  }

  // Vérifier l'orientation au chargement et au redimensionnement
  window.addEventListener("load", checkOrientation);
  window.addEventListener("resize", checkOrientation);
</script>
